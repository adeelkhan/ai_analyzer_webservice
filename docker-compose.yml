version: '3.8'

services:
  app:
    build:
      context: .
      target: development
    ports:
      - "9991:9991"
    volumes:
      - .:/app
    environment:
      - GIN_MODE=debug
      - REDIS_URL=redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    command: air

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
